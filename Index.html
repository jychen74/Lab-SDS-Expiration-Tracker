<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>實驗室 SDS 效期管理系統</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f8f9fa;
      font-family: "Helvetica Neue", Helvetica, Arial, "PingFang TC", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
    }
    .main-container {
      max-width: 1400px;
      margin: 20px auto;
      background: #ffffff;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
    }
    .left-sidebar {
      background-color: #ffffff;
      padding: 20px;
      border-right: 1px solid #dee2e6;
    }
    .right-content {
      padding: 20px;
    }
    @media (max-width: 991.98px) {
      .left-sidebar {
        border-right: none;
        border-bottom: 1px solid #dee2e6;
        padding-bottom: 30px;
      }
    }
    .table-container {
      overflow-x: auto;
      max-height: 650px;
      overflow-y: auto;
    }
    th {
      background-color: #343a40 !important;
      color: #ffffff !important;
      position: sticky;
      top: 0;
      z-index: 10;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }
    th:hover {
      background-color: #495057 !important;
    }
    .editable-cell {
      cursor: pointer;
      position: relative;
      transition: background-color 0.2s;
    }
    .editable-cell:hover {
      background-color: #e9ecef !important;
    }
    .editable-cell::after {
      content: "✏️";
      position: absolute;
      right: 5px;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0;
      font-size: 12px;
      transition: opacity 0.2s;
    }
    .editable-cell:hover::after {
      opacity: 0.5;
    }
    .status-badge {
      font-weight: bold;
      text-align: center;
      white-space: nowrap;
    }
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255,255,255,0.7);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }
    .btn-kofi {
      background-color: #ff5e5b;
      color: #ffffff !important;
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      transition: all 0.2s ease-in-out;
      box-shadow: 0 4px 6px rgba(255, 94, 91, 0.15);
    }
    .btn-kofi:hover {
      background-color: #ef4a47;
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(255, 94, 91, 0.3);
    }
    .btn-kofi:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>

  <div id="loadingOverlay" class="loading-overlay">
    <div class="text-center">
      <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;"></div>
      <div class="mt-2 fw-bold text-secondary">系統讀取與即時校正效期中...</div>
    </div>
  </div>

  <div class="container-fluid">
    <div class="row main-container">
      
      <div class="col-lg-4 left-sidebar">
        <h3 class="mb-4 text-primary fw-bold text-center text-lg-start" id="uiSidebarTitle">🧪 試劑品項防錯登錄</h3>
        
        <form id="sdsForm" onsubmit="handleFormSubmit(event)">
          <div class="mb-3">
            <label for="reagentName" class="form-label fw-bold" id="lblField1">試劑/套組名稱 <span class="text-danger">*</span></label>
            <input type="text" class="form-control" id="reagentName" required placeholder="例如：SQK-NBD114.24 文庫製備套組">
          </div>
          
          <div class="mb-3">
            <label for="brandName" class="form-label fw-bold" id="lblField2">原廠廠牌 <span class="text-danger">*</span></label>
            <input type="text" class="form-control" id="brandName" required placeholder="例如：Oxford Nanopore (ONT)">
          </div>
          
          <div class="mb-3">
            <label for="versionDate" class="form-label fw-bold" id="lblField3">目前 SDS 版本日期 <span class="text-danger">*</span></label>
            <input type="date" class="form-control" id="versionDate" required>
          </div>
          
          <div class="mb-4">
            <label for="sdsFile" class="form-label fw-bold" id="lblField4">上傳全新安全資料表 (PDF) <span class="text-danger">*</span></label>
            <input class="form-control" type="file" id="sdsFile" accept=".pdf" required>
            <div class="form-text text-muted">檔案將經由安全序列化直接存入實驗室專用雲端硬碟。</div>
          </div>
          
          <button type="submit" class="btn btn-primary w-100 fw-bold py-2 mb-3">💾 寫入資料庫並同步雲端上傳</button>
        </form>
        
        <div class="text-center mt-3 text-muted">
          <small>💡 提示：雙擊表格文字可直接修改。<br>點擊最右側按鈕可直接替換 PDF。<br>點擊【序號】或【狀態】表頭可進行排序。</small>
        </div>

        <div class="text-center mt-4 pt-3 border-top">
          <a href="https://ko-fi.com/jingyuanchen" target="_blank" class="btn btn-kofi w-100 fw-bold">
            ☕ Support Me on Ko-fi
          </a>
        </div>
      </div>
      
      <div class="col-lg-8 right-content">
        <div class="d-flex flex-column flex-sm-row justify-content-between align-items-sm-center mb-4 gap-3">
          <h2 class="fw-bold text-dark m-0" id="uiDashboardTitle">📊 實驗室動態資產看板</h2>
          <div style="max-width: 300px; width: 100%;">
            <input type="text" id="searchInput" class="form-control" onkeyup="filterTable()" placeholder="🔍 輸入關鍵字毫秒級動態篩選...">
          </div>
        </div>
        
        <div class="table-container border rounded">
          <table class="table table-striped table-hover m-0 align-middle">
            <thead>
              <tr>
                <th onclick="sortTable(0)">序號 ⇅</th>
                <th id="thField1">試劑/套組名稱</th>
                <th id="thField2">廠牌</th>
                <th id="thField3">目前 SDS 版本日期</th>
                <th>下次更新日期 (3年)</th>
                <th onclick="sortTable(5)">狀態 ⇅</th>
                <th class="text-center">雲端管轄</th>
              </tr>
            </thead>
            <tbody id="sdsTableBody">
            </tbody>
          </table>
        </div>
      </div>
      
    </div>
  </div>

  <input type="file" id="replaceFileInput" accept=".pdf" style="display: none;" onchange="executeFileReplacement()">

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  
  <script>
    let globalDataCache = [];
    let currentReplaceTarget = null; 
    let currentSortDirections = [true, true, true, true, true, true, true]; 

    // 網頁開啟時自動讀取設定與資料
    document.addEventListener("DOMContentLoaded", function() {
      initSystemSettings();
    });

    function showLoading(status) {
      document.getElementById("loadingOverlay").style.display = status ? "flex" : "none";
    }

    // 🚀 新增：動態向後台載入自訂欄位設定
    function initSystemSettings() {
      showLoading(true);
      google.script.run
        .withSuccessHandler(function(settings) {
          // 如果後台有設定，就全面抽換前端 UI 靜態文字
          if (settings.sidebarTitle) document.getElementById("uiSidebarTitle").innerText = "🧪 " + settings.sidebarTitle;
          if (settings.dashboardTitle) document.getElementById("uiDashboardTitle").innerText = "📊 " + settings.dashboardTitle;
          
          if (settings.field1Name) {
            document.getElementById("lblField1").innerHTML = settings.field1Name + ' <span class="text-danger">*</span>';
            document.getElementById("thField1").innerText = settings.field1Name;
            // 防呆：若使用者已更換非 SDS 系統，移除舊有試劑 placeholder 避免誤導
            if (settings.field1Name !== "試劑/套組名稱") document.getElementById("reagentName").placeholder = "";
          }
          if (settings.field2Name) {
            document.getElementById("lblField2").innerHTML = settings.field2Name + ' <span class="text-danger">*</span>';
            document.getElementById("thField2").innerText = settings.field2Name;
            if (settings.field2Name !== "原廠廠牌") document.getElementById("brandName").placeholder = "";
          }
          if (settings.field3Name) {
            document.getElementById("lblField3").innerHTML = settings.field3Name + ' <span class="text-danger">*</span>';
            document.getElementById("thField3").innerText = settings.field3Name;
          }
          if (settings.field4Name) {
            document.getElementById("lblField4").innerHTML = settings.field4Name + ' <span class="text-danger">*</span>';
          }
          
          // 設定抽換完畢後，接著讀取主要的表格資產資料
          loadData();
        })
        .withFailureHandler(function(err) {
          console.error("無法加載系統自訂設定: " + err);
          loadData(); // 就算設定失敗也繼續載入資料，確保系統不卡死
        })
        .getSystemSettings();
    }

    // 調用後端獲取完整試算表資產
    function loadData() {
      google.script.run
        .withSuccessHandler(function(data) {
          globalDataCache = data;
          renderTable(data);
          showLoading(false);
        })
        .withFailureHandler(function(err) {
          alert("資料載入嚴重錯誤: " + err);
          showLoading(false);
        })
        .getSDSDataFromSheet();
    }

    // 渲染前端 Table HTML 結構
    function renderTable(data) {
      const tbody = document.getElementById("sdsTableBody");
      tbody.innerHTML = "";
      
      if (data.length === 0) {
        tbody.innerHTML = `<tr><td colspan="7" class="text-center text-muted py-4">📭 目前尚無登錄任何資產，請由左側面板進行登錄。</td></tr>`;
        return;
      }
      
      data.forEach(item => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td class="fw-bold text-secondary text-center">${item.id}</td>
          <td class="editable-cell" ondblclick="makeEditable(this, ${item.rowNum}, 'name')">${item.name}</td>
          <td class="editable-cell" ondblclick="makeEditable(this, ${item.rowNum}, 'brand')">${item.brand}</td>
          <td class="editable-cell text-center" ondblclick="makeEditable(this, ${item.rowNum}, 'lastReview')">${item.lastReview}</td>
          <td class="text-center fw-bold text-dark">${item.nextReview}</td>
          <td class="status-badge" style="background-color: ${getBadgeColor(item.status).bg}; color: ${getBadgeColor(item.status).text};">${item.status}</td>
          <td class="text-center">
            <div class="btn-group btn-group-sm">
              ${item.fileUrl ? `<a href="${item.fileUrl}" target="_blank" class="btn btn-outline-success">👁️ 檢視</a>` : `<button class="btn btn-outline-secondary" disabled>🚫 無檔</button>`}
              <button class="btn btn-outline-primary" onclick="triggerFileReplacement(${item.rowNum}, '${item.name}', '${item.brand}')">🔄 替換 PDF</button>
            </div>
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    function getBadgeColor(status) {
      if (status.includes("過期")) return { bg: "#FFD2D2", text: "#990000" };
      if (status.includes("預警")) return { bg: "#FFE4C4", text: "#B8860B" };
      return { bg: "#D4EDDA", text: "#155724" };
    }

    // 處理雙擊即時修改儲存格文字 (Inline Editing)
    function makeEditable(cell, rowNum, columnType) {
      if (cell.querySelector("input")) return; 
      
      const originalValue = cell.innerText.trim();
      const input = document.createElement("input");
      input.type = columnType === "lastReview" ? "date" : "text";
      input.className = "form-control form-control-sm d-inline-block";
      input.value = originalValue;
      input.style.width = "100%";
      
      cell.innerText = "";
      cell.appendChild(input);
      input.focus();
      
      input.onblur = function() {
        commitCellEdit(cell, rowNum, columnType, input.value, originalValue);
      };
      
      input.onkeydown = function(e) {
        if (e.key === "Enter") input.blur();
        if (e.key === "Escape") {
          cell.innerHTML = originalValue; 
        }
      };
    }

    function commitCellEdit(cell, rowNum, columnType, newValue, originalValue) {
      if (newValue === originalValue) {
        cell.innerHTML = originalValue;
        return;
      }
      
      showLoading(true);
      google.script.run
        .withSuccessHandler(function(res) {
          if (res.success) {
            loadData(); 
          } else {
            alert("修改儲存失敗：" + res.error);
            cell.innerHTML = originalValue;
            showLoading(false);
          }
        })
        .withFailureHandler(function(err) {
          alert("連線後端失敗：" + err);
          cell.innerHTML = originalValue;
          showLoading(false);
        })
        .updateCellFromUI(rowNum, columnType, newValue);
    }

    function triggerFileReplacement(rowNum, reagentName, brandName) {
      currentReplaceTarget = { rowNum, reagentName, brandName };
      document.getElementById("replaceFileInput").click();
    }

    function executeFileReplacement() {
      const fileInput = document.getElementById("replaceFileInput");
      if (fileInput.files.length === 0 || !currentReplaceTarget) return;
      
      const file = fileInput.files[0];
      const reader = new FileReader();
      
      showLoading(true);
      reader.onload = function(e) {
        const fileData = e.target.result;
        google.script.run
          .withSuccessHandler(function(res) {
            alert(res.message);
            fileInput.value = ""; 
            currentReplaceTarget = null;
            loadData(); 
          })
          .withFailureHandler(function(err) {
            alert("檔案替換發生重大錯誤：" + err);
            showLoading(false);
          })
          .replaceSDSFileFromUI(
            currentReplaceTarget.rowNum,
            currentReplaceTarget.reagentName,
            currentReplaceTarget.brandName,
            fileData,
            file.name
          );
      };
      reader.readAsDataURL(file);
    }

    function handleFormSubmit(event) {
      event.preventDefault();
      showLoading(true);
      
      const fileInput = document.getElementById("sdsFile");
      const file = fileInput.files[0];
      
      const formData = {
        reagentName: document.getElementById("reagentName").value.trim(),
        brandName: document.getElementById("brandName").value.trim(),
        versionDate: document.getElementById("versionDate").value,
        fileData: null,
        fileName: null
      };
      
      const reader = new FileReader();
      reader.onload = function(e) {
        formData.fileData = e.target.result;
        formData.fileName = file.name;
        
        google.script.run
          .withSuccessHandler(function(response) {
            alert(response.message);
            document.getElementById("sdsForm").reset(); 
            loadData(); 
          })
          .withFailureHandler(function(error) {
            alert("系統寫入發生錯誤: " + error);
            showLoading(false);
          })
          .addNewSDSWithFile(formData);
      };
      reader.readAsDataURL(file);
    }

    function filterTable() {
      const input = document.getElementById("searchInput").value.toUpperCase();
      const trs = document.getElementById("sdsTableBody").getElementsByTagName("tr");
      
      for (let i = 0; i < trs.length; i++) {
        if (trs[i].getElementsByTagName("td").length < 2) continue; 
        const nameText = trs[i].getElementsByTagName("td")[1].innerText.toUpperCase();
        const brandText = trs[i].getElementsByTagName("td")[2].innerText.toUpperCase();
        
        if (nameText.indexOf(input) > -1 || brandText.indexOf(input) > -1) {
          trs[i].style.display = "";
        } else {
          trs[i].style.display = "none";
        }
      }
    }

    function sortTable(colIndex) {
      const tableBody = document.getElementById("sdsTableBody");
      let rows = Array.from(tableBody.querySelectorAll("tr"));
      if (rows.length === 0 || rows[0].innerText.includes("目前尚無登錄")) return;

      const direction = currentSortDirections[colIndex];
      currentSortDirections[colIndex] = !direction; 

      rows.sort((rowA, rowB) => {
        const cellA = rowA.getElementsByTagName("td")[colIndex].innerText.trim();
        const cellB = rowB.getElementsByTagName("td")[colIndex].innerText.trim();

        if (colIndex === 0) {
          return direction ? Number(cellA) - Number(cellB) : Number(cellB) - Number(cellA);
        } else if (colIndex === 5) {
          const getPriority = (status) => {
            if (status.includes("🚨")) return 3;
            if (status.includes("⚠️")) return 2;
            return 1;
          };
          return direction ? getPriority(cellB) - getPriority(cellA) : getPriority(cellA) - getPriority(cellB);
        }
        return 0;
      });

      tableBody.innerHTML = "";
      rows.forEach(row => tableBody.appendChild(row));
    }
  </script>
</body>
</html>
